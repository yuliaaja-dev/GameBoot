<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pong PWA</title>

<!-- WAJIB SESUAI INSTRUKSI -->
<link rel="manifest" href="/manifest.json" id="4h8jdf">
<meta name="theme-color" content="#000000">

<link rel="icon" type="image/png" sizes="192x192" href="images/icons/icon-192.png">
<link rel="apple-touch-icon" href="images/icons/icon-192.png">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="background"></div>

<header class="topbar">
    <h1>PONG</h1>
    <p>Player vs AI</p>
</header>

<main class="game-area">

    <div class="scoreboard">

        <div class="score-box">
            <span class="label">PLAYER</span>
            <span id="playerScore">0</span>
        </div>

        <div class="divider">:</div>

        <div class="score-box">
            <span class="label">AI</span>
            <span id="aiScore">0</span>
        </div>

    </div>

    <div class="canvas-wrapper">

        <canvas
            id="gameCanvas"
            width="900"
            height="500">
        </canvas>

    </div>

    <div class="controls">

        <button id="startBtn">
            Start Game
        </button>

        <button id="restartBtn">
            Restart
        </button>

    </div>

</main>

<!-- Floating Popup -->

<div id="popup" class="popup hidden">

    <div class="popup-card">

        <h2 id="popupTitle">
            You Win
        </h2>

        <p id="popupMessage">
            Congratulations!
        </p>

        <button id="playAgainBtn">
            Play Again
        </button>

    </div>

</div>

<noscript>

Website ini membutuhkan JavaScript.

</noscript>

<script src="app.js"></script>

<script>

if ("serviceWorker" in navigator) {

window.addEventListener("load", () => {

navigator.serviceWorker.register("sw.js");

});

}

</script>

</body>
</html>
